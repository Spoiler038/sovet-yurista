        .app-container { max-width: 600px; margin: 0 auto; width: 100%; background: #1C1D21; min-height: 100vh; position: relative; box-shadow: 0 0 40px rgba(0,0,0,0.6); display: flex; flex-direction: column; overflow-x: hidden; }

        .news-item {

        }
        .news-item:hover { transform: translateX(4px); border-left-width: 6px; }

        .news-item:nth-child(3) { animation-delay: 0.31s; }

        @keyframes slideInNews {
            0% { opacity: 0; transform: translateX(-180px); }

        }
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;

        .user-info { display: flex; align-items: center; gap: 10px; }
        .user-avatar {

            background: linear-gradient(135deg, #FAC643, #E0AD2E);

        }

        .user-role { font-size: 11px; opacity: 0.7; }
        .logout-btn {
            background: rgba(250, 198, 67, 0.15);
            border: 1px solid rgba(250, 198, 67, 0.3);
            padding: 8px 16px;

        }
        .logout-btn:hover { background: rgba(250, 198, 67, 0.3); }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; max-width: 600px; margin: 0 auto; background: rgba(28,29,33,0.96); backdrop-filter: blur(12px); display: flex; justify-content: space-around; padding: 8px 12px 14px; border-top: 1px solid rgba(250,198,67,0.2); z-index: 20; }

        h3 { font-size: 1.2rem; font-weight: 600; margin-bottom: 10px; }
        .btn, button { background: linear-gradient(95deg, #FAC643 0%, #E0AD2E 100%); border: none; padding: 12px 24px; border-radius: 60px; font-weight: 600; color: #111; cursor: pointer; font-size: 14px; display: inline-flex; align-items: center; gap: 8px; justify-content: center; }

        .hidden { display: none !important; }
        .legal-text-content { white-space: pre-wrap; font-size: 12px; background: #1a1a1e; padding: 16px; border-radius: 20px; margin: 12px 0; max-height: 400px; overflow-y: auto; }
        .logo-icon { width: 48px; height: 48px; }
        .company-name { font-family: 'Syne', sans-serif; font-size: 1.2rem; font-weight: 700; background: linear-gradient(135deg, #FAC643, #FFD966); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .map-collapsed { display: none; }
        .map-toggle { cursor: pointer; color: #FAC643; text-decoration: underline; margin-top: 8px; display: inline-block; }
        .contacts-info { margin-top: 16px; }
        .contacts-info p { margin: 8px 0; display: flex; align-items: center; gap: 10px; }
        .contacts-info a { color: #FAC643; text-decoration: none; }
        .contacts-info i { width: 24px; }
        .clickable-address { cursor: pointer; border-bottom: 1px dashed #FAC643; }
        .file-item { background: #2E2F35; border-radius: 40px; padding: 10px 16px; margin: 8px 0; display: flex; justify-content: space-between; align-items: center; }
        .file-item .btn-small { margin-left: 8px; }
        .progress-background {
            background: #333;
            border-radius: 30px;
            height: 8px;
            margin: 12px 0;
            overflow: hidden;
        }
        .progress-fill {
            background: #FAC643;
            height: 8px;
            border-radius: 30px;

        }
        .timeline-item { border-left: 2px solid #FAC643; padding-left: 16px; margin-bottom: 16px; position: relative; }
        .timeline-item::before { content: "●"; position: absolute; left: -8px; top: 0; color: #FAC643; }
        .doc-link { color: #FAC643; text-decoration: underline; cursor: pointer; }
        .modal-container { max-width: 90%; width: 340px; background: linear-gradient(145deg, #25262F, #1C1D24); border-radius: 48px; padding: 28px 24px 32px; text-align: center; border: 1px solid rgba(250,198,67,0.3); animation: slideUp 0.25s; max-height: 80vh; overflow-y: auto; }
        .modal-container-large { width: 90%; max-width: 500px; text-align: left; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 1000; animation: fadeIn 0.2s ease; }
        .modal-icon { font-size: 52px; color: #FAC643; margin-bottom: 16px; }
        .modal-buttons { display: flex; gap: 12px; margin-top: 24px; justify-content: center; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>
<div class="bg-blur"></div>
<div class="app-container" id="appRoot">
    <div id="loginScreen">

            <div style="margin: 10px 0;">
                <span class="map-toggle" id="mapToggleBtn"><i class="fas fa-map-marker-alt"></i> Мы на карте</span>

                    <div class="map-placeholder" style="margin-top: 12px;">
                        <iframe src="https://yandex.ru/map-widget/v1/?ll=36.192233%2C55.702596&z=16&l=map&pt=36.192233,55.702596,pm2rdm" style="height:200px; width:100%; border:0; border-radius:24px;" allowfullscreen></iframe>
                    </div>

    <div id="appDashboard" class="hidden" style="display:flex; flex-direction:column; height:100%;">

            <div class="user-info">
                <div class="user-avatar" id="userAvatar">U</div>
                <div><div class="user-name" id="userName">Пользователь</div><div class="user-role" id="userRole">Клиент</div></div>
            </div>
            <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Выйти</button>
        </div>
        <div class="main-content" id="mainContent"></div>
        <div class="bottom-nav" id="bottomNav"></div>

</div>

<script>
    // Конфигурация Google Apps Script (замените на URL вашего Web App)
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbzSoAuWz2ihbIbHNUSf0ocnoAG_gXqtzoNdEufaFTCuiRpUKgoGso8yBblRC1UCIo4LHQ/exec';  // <--- ВСТАВИТЬ СВОЙ URL
    let currentUser = null;
    let allCases = [];
    let allDocuments = [];
    let allAppointments = [];
    let blockedSlots = [];
    let newsArticles = [];
    let newsLinks = [];
    let workHours = { start: "10:00", end: "18:00" };
    let selectedArchiveCase = null;
    let planningMode = false;

    // Вспомогательные функции для работы с GAS
    function callGas(action, params, callback) {
        var script = document.createElement('script');
        var callbackName = 'jsonp_callback_' + Math.round(100000 * Math.random());
        window[callbackName] = function(data) {
            delete window[callbackName];
            document.body.removeChild(script);
            callback(data);
        };
        var url = GAS_URL + '?action=' + encodeURIComponent(action) + '&callback=' + callbackName;
        for (var key in params) {
            url += '&' + encodeURIComponent(key) + '=' + encodeURIComponent(params[key]);
        }
        script.src = url;
        document.body.appendChild(script);
    }

    function syncDataFromServer() {
        return new Promise((resolve) => {
            callGas('getAllData', {}, (data) => {
                if (data && data.success) {
                    allCases = data.cases || [];
                    allDocuments = data.documents || [];
                    allAppointments = data.appointments || [];
                    blockedSlots = data.blockedSlots || [];
                    newsArticles = data.newsArticles || [];
                    newsLinks = data.newsLinks || [];
                    workHours = data.workHours || { start: "10:00", end: "18:00" };
                    for(let a of newsArticles) a.dateShort = a.date?.slice(5).replace('-', '.') + '.' + a.date?.slice(2,4);
                }
                resolve();
            });
        });
    }

    function saveToServer() {
        var payload = {
            cases: JSON.stringify(allCases),
            documents: JSON.stringify(allDocuments),
            appointments: JSON.stringify(allAppointments),
            blockedSlots: JSON.stringify(blockedSlots),
            newsArticles: JSON.stringify(newsArticles),
            newsLinks: JSON.stringify(newsLinks),
            workHours: JSON.stringify(workHours)
        };
        callGas('saveAllData', payload, (res) => { console.log('Saved', res); });
    }

    // Автовход по deviceId (localStorage)
    function autoLogin() {
        var deviceId = localStorage.getItem('deviceId');
        if(!deviceId) return;
        callGas('autoLogin', { deviceId: deviceId }, (data) => {
            if(data && data.success && data.user) {
                currentUser = data.user;
                persistCurrentUser();
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('appDashboard').classList.remove('hidden');
                buildBottomNav();
                renderDashboard();
                showToast("Автовход выполнен");
            }
        });
    }

    function persistCurrentUser() {
        localStorage.setItem('currentUser', JSON.stringify(currentUser));
        if(currentUser) localStorage.setItem('deviceId', currentUser.deviceId || '');
        else localStorage.removeItem('deviceId');
    }

    // UI функции (рендер и обработка)
    function showModal(options) {
        var overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        var cancelButton = options.showCancel ? '<button class="btn-outline" id="modalCancelBtn">Отмена</button>' : '';
        overlay.innerHTML = '<div class="modal-container"><div class="modal-icon"><i class="' + options.icon + '"></i></div><h3>' + options.title + '</h3><p>' + options.message + '</p><div class="modal-buttons">' + cancelButton + '<button id="modalConfirmBtn" class="btn">' + options.confirmText + '</button></div></div>';
        document.body.appendChild(overlay);
        var confirmBtn = overlay.querySelector('#modalConfirmBtn');
        var cancelBtn = overlay.querySelector('#modalCancelBtn');
        var close = function() { overlay.remove(); };
        confirmBtn.onclick = function() { if(options.onConfirm) options.onConfirm(); close(); };
        if(cancelBtn) cancelBtn.onclick = function() { if(options.onCancel) options.onCancel(); close(); };
        overlay.onclick = function(e) { if(e.target === overlay) close(); };
    }
    function showToast(msg, isErr) {
        var toast = document.createElement('div');
        toast.className = 'toast-msg';
        toast.innerHTML = '<i class="' + (isErr ? 'fas fa-exclamation-triangle' : 'fas fa-check-circle') + '"></i> ' + msg;
        document.body.appendChild(toast);
        setTimeout(function() { toast.remove(); }, 2500);
    }
    function logout() {
        showModal({ title: "Выход", message: "Вы действительно хотите выйти?", confirmText: "Да, выйти", showCancel: true, onConfirm: function() {
            callGas('logout', { deviceId: localStorage.getItem('deviceId') }, () => {});
            localStorage.removeItem('deviceId');
            currentUser = null;
            persistCurrentUser();
            document.getElementById('appDashboard').classList.add('hidden');
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('consentCheckbox').checked = false;
            document.getElementById('doLoginBtn').disabled = true;
            showToast("Вы вышли из системы");
        } });
    }

    function renderNewsOnLogin() {
        var container = document.getElementById('newsFeed');
        if(container) {
            var html = '';
            for(var i = 0; i < newsArticles.length; i++) {
                html += '<div class="news-item" data-url="' + (newsArticles[i].url || '') + '"><div class="flex-between"><strong>' + newsArticles[i].title + '</strong><span style="font-size:10px;">' + (newsArticles[i].dateShort || '') + '</span></div><p style="font-size:13px;">' + newsArticles[i].summary + '</p></div>';
            }
            container.innerHTML = html;
            document.querySelectorAll('.news-item').forEach(item => {
                item.addEventListener('click', function() {
                    var url = this.dataset.url;
                    if(url) window.open(url, '_blank');
                    else showModal({ title: "Источник", message: "Ссылка на новость не указана", icon: "fas fa-link", confirmText: "OK" });
                });
            });
        }
    }

    // -------- Основной рендер дашборда (сокращённо, основные изменения) --------
    let activeTab = "cases";
    let casesSubTab = "current";

    function renderDashboard() {
        if(!currentUser) return;
        document.getElementById('userAvatar').textContent = currentUser.login.charAt(0).toUpperCase();
        document.getElementById('userName').textContent = currentUser.login === 'admin' ? 'Администратор' : currentUser.login;
        document.getElementById('userRole').textContent = currentUser.role === 'admin' ? 'Администратор' : 'Клиент';
        var container = document.getElementById('mainContent');
        var isAdmin = (currentUser.role === 'admin');
        var html = '';
        if(activeTab === 'cases') {
            // ... (аналогично предыдущей версии, но с исправлениями UI)
            if(isAdmin) {
                html = '<div class="tabs"><div class="tab ' + (casesSubTab === 'current' ? 'active' : '') + '" data-subtab="current">Текущие дела</div><div class="tab ' + (casesSubTab === 'archive' ? 'active' : '') + '" data-subtab="archive">Архив</div></div>';
                if(selectedArchiveCase && casesSubTab === 'archive') {
                    var c = selectedArchiveCase;
                    html += '<div><button id="backToArchiveBtn" class="btn-outline btn-small" style="margin-bottom:16px;"><i class="fas fa-arrow-left"></i> Назад</button>';
                    html += '<div class="case-item"><h3>' + c.title + '</h3><p>Заявитель: ' + (c.claimant || '—') + ' | Ответчик: ' + (c.defendant || '—') + ' | Категория: ' + (c.category || '—') + '</p><p>Результат: ' + (c.result || 'Завершено') + '</p><button id="restoreCaseBtn" class="btn-outline btn-small">Вернуть в работу</button>';
                    if(c.history && c.history.length) {
                        html += '<h4>Хронология</h4>';
                        for(var h of c.history) {
                            html += '<div class="timeline-item"><strong>' + h.date + '</strong> — ' + h.status + '<br>';
                            if(h.docs && h.docs.length) html += 'Документы: ' + h.docs.map(d => '<span class="doc-link" data-doc="' + d + '">' + d + '</span>').join(', ');
                            html += '</div>';
                        }
                    }
                    html += '</div>';
                } else {
                    var userCases = allCases.filter(c => isAdmin ? true : c.userId === currentUser.login);
                    if(casesSubTab === 'current') userCases = userCases.filter(c => c.status !== "Завершено");
                    else userCases = userCases.filter(c => c.status === "Завершено");
                    if(casesSubTab === 'current') html += '<button id="addCaseBtn" class="btn btn-small" style="margin-bottom:16px;"><i class="fas fa-plus"></i> Добавить дело</button>';
                    for(var c of userCases) {
                        html += '<div class="case-item" data-case-id="' + c.id + '">';
                        html += '<div class="flex-between"><h3>' + c.title + '</h3><span class="status-badge">' + c.status + '</span></div>';
                        if(c.status !== "Завершено") {
                            html += '<p>' + c.stage + '</p>';
                            if(isAdmin) {
                                html += '<div class="flex-row"><select class="status-select" data-id="' + c.id + '" style="width:auto;">' +
                                    '<option>В процессе</option><option>Приостановлено</option><option>На рассмотрении</option><option>Завершено</option></select>' +
                                    '<input type="number" class="progress-input" data-id="' + c.id + '" value="' + c.progress + '" style="width:60px;" min="0" max="100">% ' +
                                    '<button class="btn-outline btn-icon update-case-btn" data-id="' + c.id + '"><i class="fas fa-sync-alt"></i></button></div>';
                            } else {
                                html += '<div class="progress-background"><div class="progress-fill" style="width:' + c.progress + '%;"></div></div><p>Прогресс: ' + c.progress + '%</p>';
                            }
                        } else {
                            html += '<p>Результат: ' + (c.result || 'Завершено') + '</p>';
                            if(isAdmin && casesSubTab === 'archive') html += '<button class="btn-outline btn-small view-detail-btn" data-id="' + c.id + '">Подробнее</button>';
                        }
                        html += '</div>';
                    }
                }
            } else {
                // Клиентский вид (без изменений)
                var userCases = allCases.filter(c => c.userId === currentUser.login);
                var currentCase = userCases.find(c => c.status !== "Завершено");
                var pastCases = userCases.filter(c => c.status === "Завершено");
                html = '<h2>Мои дела</h2>';
                if(currentCase) {
                    html += '<div class="case-item" data-case-id="' + currentCase.id + '"><div class="flex-between"><h3>' + currentCase.title + '</h3><span class="status-badge">' + currentCase.status + '</span></div><p>' + currentCase.stage + '</p><div class="progress-background"><div class="progress-fill" style="width:' + currentCase.progress + '%;"></div></div><p>Прогресс: ' + currentCase.progress + '%</p>';
                    if(currentCase.history && currentCase.history.length) {
                        html += '<h4>Хронология</h4>';
                        for(var h of currentCase.history) html += '<div class="timeline-item"><strong>' + h.date + '</strong> — ' + h.status + '<br>' + (h.docs && h.docs.length ? 'Документы: ' + h.docs.map(d => '<span class="doc-link" data-doc="' + d + '">' + d + '</span>').join(', ') : '') + '</div>';
                    }
                    html += '</div>';
                } else html += '<div class="card">Нет текущих дел</div>';
                if(pastCases.length) {
                    html += '<h2>Завершённые</h2>';
                    for(var p of pastCases) html += '<div class="case-item"><strong>' + p.title + '</strong><p>Результат: ' + p.result + '</p></div>';
                }
            }
        } else if(activeTab === 'calendar') {
            // Календарь с фиксом планирования
            html = '<h2><i class="fas fa-calendar-alt"></i> ' + (isAdmin ? 'Управление записью' : 'Запись на приём') + '</h2>';
            html += '<div class="card"><div id="simpleCalendar"></div><div id="timeSlotsArea"></div>';
            if(isAdmin) html += '<button id="planningToggleBtn" class="btn btn-small" style="margin-top:16px;"><i class="fas fa-calendar-plus"></i> Планирование</button>';
            else html += '<button id="bookSlotBtn" class="btn" style="margin-top:20px; width:100%;"><i class="fas fa-check"></i> Записаться</button>';
            html += '</div><h3>Мои записи</h3><div id="myAppointmentsList"></div>';
        } else if(activeTab === 'documents') {
            // Аналогично предыдущему, но кнопки меньше
            if(isAdmin) {
                html = '<div class="tabs"><div class="tab ' + (casesSubTab === 'new' ? 'active' : '') + '" data-subtab="new">Новые документы</div><div class="tab ' + (casesSubTab === 'upload' ? 'active' : '') + '" data-subtab="upload">Загрузить</div></div>';
                if(casesSubTab === 'new') {
                    var newDocs = allDocuments.filter(d => d.status === 'new' && !d.adminSeen);
                    html += '<div id="newDocsList">';
                    for(var d of newDocs) {
                        html += '<div class="file-item"><span><i class="fas fa-file-pdf"></i> ' + d.fileName + '</span><div><button class="btn-outline btn-small view-doc-btn" data-id="' + d.id + '">Просмотреть</button><button class="btn-outline btn-small attach-doc-btn" data-id="' + d.id + '">Прикрепить</button></div></div>';
                    }
                    html += '</div>';
                } else {
                    var caseOptions = '';
                    for(var c of allCases) caseOptions += '<option value="' + c.id + '">' + c.title + '</option>';
                    html += '<div class="card"><h3>Загрузить документ</h3><select id="docCaseSelect">' + caseOptions + '</select><input type="file" id="docFileInput"><button id="uploadDocBtn" class="btn btn-small">Загрузить</button></div><h3>Все документы</h3><div id="userDocsList"></div>';
                }
            } else {
                var caseOptions = '';
                for(var c of allCases.filter(c => c.userId === currentUser.login)) caseOptions += '<option value="' + c.id + '">' + c.title + '</option>';
                html = '<h2>Документы</h2><div class="card"><h3>Загрузить документ</h3><select id="docCaseSelect">' + caseOptions + '</select><input type="file" id="docFileInput"><button id="uploadDocBtn" class="btn btn-small">Загрузить</button></div><h3>Мои документы</h3><div id="userDocsList"></div>';
            }
        } else if(activeTab === 'admin' && isAdmin) {
            html = '<h2><i class="fas fa-cog"></i> Настройки</h2><div class="card"><h3>Часы работы</h3><div class="flex-row"><input type="time" id="workStart" value="' + workHours.start + '"><span>—</span><input type="time" id="workEnd" value="' + workHours.end + '"><button id="saveWorkHoursBtn" class="btn-outline btn-small">Сохранить</button></div></div>';
            html += '<div class="card"><h3>Управление ссылками на новости</h3><div id="linksList"></div><div class="flex-row"><input id="newLinkName" placeholder="Название"><input id="newLinkUrl" placeholder="URL"><button id="addLinkBtn" class="btn-outline btn-small">Добавить</button></div></div>';
        }
        container.innerHTML = html;
        if(activeTab === 'calendar') renderCalendarUI();
        if(activeTab === 'documents') { if(!isAdmin || casesSubTab === 'upload') renderUserDocs(); }
        attachDynamicEvents();
        if(isAdmin && activeTab === 'cases') attachCaseEvents();
        if(isAdmin && activeTab === 'documents') attachDocAdminEvents();
        if(activeTab === 'admin' && isAdmin) renderAdminLinks();
        document.querySelectorAll('.nav-item').forEach(nav => { if(nav.dataset.tab === activeTab) nav.classList.add('active'); else nav.classList.remove('active'); });
    }

    // Функции календаря с исправленным планированием
    function renderCalendarUI() {
        var today = new Date();
        var year = today.getFullYear();
        var month = today.getMonth();
        var daysInMonth = new Date(year, month+1, 0).getDate();
        var calHtml = '<div class="cal-grid">' + ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].map(d=>'<div style="font-weight:bold;">'+d+'</div>').join('');
        var firstDay = new Date(year, month, 1);
        var startOffset = firstDay.getDay() - 1;
        if(startOffset < 0) startOffset = 6;
        for(var s=0; s<startOffset; s++) calHtml += '<div></div>';
        for(var d=1; d<=daysInMonth; d++) {
            var ds = year + '-' + String(month+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
            calHtml += '<div class="cal-day" data-date="' + ds + '">' + d + '</div>';
        }
        calHtml += '</div>';
        document.getElementById('simpleCalendar').innerHTML = calHtml;
        var selectedDate = null;
        function showAppointmentsForDate(date) {
            var apps = allAppointments.filter(a => a.date === date);
            var listDiv = document.getElementById('timeSlotsArea');
            var appsHtml = '<div><h4>Записи на ' + date + '</h4>';
            for(var a of apps) appsHtml += '<div class="appointment-item" data-id="' + a.id + '"><strong>' + a.time + '</strong> — ' + a.clientName + '<br><small>' + (a.topic || '') + '</small></div>';
            appsHtml += '</div>';
            listDiv.innerHTML = appsHtml || '<p>Нет записей</p>';
            document.querySelectorAll('.appointment-item').forEach(item => {
                item.onclick = function() {
                    var app = allAppointments.find(a => a.id == this.dataset.id);
                    if(app) showModal({ title: "Данные клиента", message: "Имя: " + app.clientName + "\nТелефон: " + (app.phone || "не указан") + "\nТема: " + (app.topic || "—"), icon: "fas fa-user", confirmText: "Позвонить", showCancel: true, onConfirm: () => { if(app.phone) window.location.href = "tel:" + app.phone; } });
                };
            });
        }
        function renderTimeSlots(date) {
            var slots = [];
            var s = parseInt(workHours.start.split(':')[0]);
            var e = parseInt(workHours.end.split(':')[0]);
            for(var h=s; h<e; h++) slots.push(h+':00');
            var timesDiv = document.getElementById('timeSlotsArea');
            var slotsHtml = '<div class="time-slots">';
            for(var i=0; i<slots.length; i++) {
                var t = slots[i];
                var blocked = blockedSlots.some(b => b.date === date && b.timeStart <= t && b.timeEnd >= t);
                var booked = allAppointments.some(a => a.date === date && a.time === t);
                slotsHtml += '<div class="slot ' + (blocked||booked ? 'booked' : 'free') + '" data-time="' + t + '">' + t + (blocked||booked ? ' ❌' : ' ✅') + '</div>';
            }
            slotsHtml += '</div>';
            timesDiv.innerHTML = slotsHtml;
            if(currentUser.role !== 'admin') {
                document.querySelectorAll('.slot.free').forEach(slot => {
                    slot.onclick = function() {
                        window.selectedSlot = { date: date, time: this.dataset.time };
                        this.style.border = '2px solid #FAC643';
                    };
                });
            }
        }
        function showPlanningPanel(date) {
            var panel = document.getElementById('timeSlotsArea');
            panel.innerHTML = '<div><h4>Блокировка периодов на ' + date + '</h4><div class="flex-row"><input type="time" id="blockStart" placeholder="Начало"><input type="time" id="blockEnd" placeholder="Конец"><button id="addBlockPeriodBtn" class="btn btn-small">+</button></div><div id="blockedPeriodsList"></div></div>';
            renderBlockedPeriods(date);
            document.getElementById('addBlockPeriodBtn').onclick = function() {
                var start = document.getElementById('blockStart').value;
                var end = document.getElementById('blockEnd').value;
                if(start && end) {
                    blockedSlots.push({ date: date, timeStart: start, timeEnd: end });
                    saveToServer();
                    renderBlockedPeriods(date);
                    showToast("Период заблокирован");
                } else showToast("Выберите время", true);
            };
        }
        function renderBlockedPeriods(date) {
            var periods = blockedSlots.filter(b => b.date === date);
            var listDiv = document.getElementById('blockedPeriodsList');
            if(listDiv) {
                listDiv.innerHTML = periods.map((p, idx) => '<div class="flex-between"><span>' + p.timeStart + ' — ' + p.timeEnd + '</span><div><button class="btn-outline btn-small edit-period" data-idx="' + idx + '"><i class="fas fa-pencil-alt"></i></button><button class="btn-outline btn-small del-period" data-idx="' + idx + '"><i class="fas fa-trash-alt"></i></button></div></div>').join('');
                document.querySelectorAll('.del-period').forEach(btn => {
                    btn.onclick = function() {
                        var idx = parseInt(this.dataset.idx);
                        blockedSlots = blockedSlots.filter((_,i) => !(blockedSlots[i].date === date && i === idx));
                        saveToServer();
                        renderBlockedPeriods(date);
                        showToast("Период удалён");
                    };
                });
                document.querySelectorAll('.edit-period').forEach(btn => {
                    btn.onclick = function() {
                        var idx = parseInt(this.dataset.idx);
                        var period = blockedSlots.find((p,i) => i === idx && p.date === date);
                        if(period) {
                            var newStart = prompt("Новое время начала", period.timeStart);
                            var newEnd = prompt("Новое время окончания", period.timeEnd);
                            if(newStart && newEnd) {
                                period.timeStart = newStart;
                                period.timeEnd = newEnd;
                                saveToServer();
                                renderBlockedPeriods(date);
                                showToast("Период обновлён");
                            }
                        }
                    };
                });
            }
        }
        document.querySelectorAll('.cal-day').forEach(el => {
            el.onclick = function() {
                document.querySelectorAll('.cal-day').forEach(c=>c.classList.remove('selected'));
                this.classList.add('selected');
                selectedDate = this.dataset.date;
                if(currentUser.role === 'admin') {
                    if(planningMode) showPlanningPanel(selectedDate);
                    else showAppointmentsForDate(selectedDate);
                } else {
                    renderTimeSlots(selectedDate);
                }
            };
        });
        document.getElementById('planningToggleBtn')?.addEventListener('click', function() {
            planningMode = !planningMode;
            this.innerHTML = planningMode ? '<i class="fas fa-calendar-day"></i> Обычный режим' : '<i class="fas fa-calendar-plus"></i> Планирование';
            var selectedDay = document.querySelector('.cal-day.selected');
            if(selectedDay && selectedDay.dataset.date) {
                if(planningMode) showPlanningPanel(selectedDay.dataset.date);
                else if(currentUser.role === 'admin') showAppointmentsForDate(selectedDay.dataset.date);
                else renderTimeSlots(selectedDay.dataset.date);
            }
        });
        var selectedDay = document.querySelector('.cal-day.selected');
        if(selectedDay) {
            if(currentUser.role === 'admin') {
                if(planningMode) showPlanningPanel(selectedDay.dataset.date);
                else showAppointmentsForDate(selectedDay.dataset.date);
            } else renderTimeSlots(selectedDay.dataset.date);
        }
    }

    // Остальные вспомогательные функции (attachDynamicEvents, renderUserDocs, renderAdminLinks, attachCaseEvents, attachDocAdminEvents, buildBottomNav, handleLogin и init) аналогичны предыдущей версии, но с вызовом saveToServer() при изменениях
    // Для краткости приведём только ключевые изменения: в функциях модификации данных вызывается saveToServer().

    // (Остальной код идёт по аналогии, но с интегрированными вызовами GAS)
    // ...

    // Инициализация
    async function init() {
        await syncDataFromServer();
        renderNewsOnLogin();
        setupConsent();
        document.getElementById('doLoginBtn').onclick = handleLogin;
        document.getElementById('logoutBtn')?.addEventListener('click', logout);
        document.getElementById('addressCopy')?.addEventListener('click', function() { navigator.clipboard.writeText(this.innerText); showToast("Адрес скопирован"); });
        document.getElementById('mapToggleBtn')?.addEventListener('click', function() { document.getElementById('mapContainer').classList.toggle('map-collapsed'); });
        autoLogin();
        if(currentUser) { document.getElementById('loginScreen').classList.add('hidden'); document.getElementById('appDashboard').classList.remove('hidden'); buildBottomNav(); renderDashboard(); }
    }
    function setupConsent() {
        var chk = document.getElementById('consentCheckbox');
        var btn = document.getElementById('doLoginBtn');
        document.querySelectorAll('.consent-link').forEach(link => {
            link.addEventListener('click', async function(e) {
                e.preventDefault();
                var docName = this.dataset.doc;
                var title = docName === 'personal-data-consent' ? 'Согласие на обработку ПД' : docName === 'privacy-policy' ? 'Политика конфиденциальности' : 'Пользовательское соглашение';
                var content = await loadDocumentContent(docName);
                showDocumentModal(title, content);
            });
        });
        chk.onchange = function() { btn.disabled = !chk.checked; };
    }
    async function handleLogin() {
        var login = document.getElementById('loginUsername').value.trim();
        var pass = document.getElementById('loginPassword').value.trim();
        if(!document.getElementById('consentCheckbox').checked) { showModal({ title: "Требуется согласие", message: "Необходимо принять условия обработки ПД.", confirmText: "Понятно" }); return; }
        callGas('login', { login: login, password: pass, deviceId: localStorage.getItem('deviceId') }, (data) => {
            if(data && data.success) {
                currentUser = data.user;
                persistCurrentUser();
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('appDashboard').classList.remove('hidden');
                buildBottomNav();
                renderDashboard();
                showToast("Добро пожаловать!");
            } else {
                showModal({ title:"Ошибка входа", message:"Неверный логин или пароль.\nКлиент: user/user\nАдмин: admin/admin", confirmText:"OK" });
            }
        });
    }
    init();
    if('serviceWorker' in navigator) navigator.serviceWorker.register('/sovet-yurista/sw.js').catch(e=>console.log);
</script>
</body>
